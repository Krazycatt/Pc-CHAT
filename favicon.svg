<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e7c66"/>
      <stop offset="100%" stop-color="#0a5f4e"/>
    </linearGradient>
    <linearGradient id="s" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="512" height="512" rx="108" fill="url(#g)"/>
  <!-- Monitor body -->
  <rect x="96" y="80" width="320" height="224" rx="20" fill="url(#s)" stroke="#fff" stroke-width="8" stroke-opacity=".15"/>
  <!-- Screen -->
  <rect x="116" y="100" width="280" height="184" rx="10" fill="#0d2b24"/>
  <!-- Screen glow -->
  <rect x="116" y="100" width="280" height="184" rx="10" fill="#59ff96" opacity=".06"/>
  <!-- Terminal cursor line -->
  <rect x="140" y="146" width="14" height="22" rx="2" fill="#59ff96" opacity=".9"/>
  <!-- Terminal text lines -->
  <rect x="164" y="148" width="120" height="4" rx="2" fill="#59ff96" opacity=".5"/>
  <rect x="164" y="162" width="80" height="4" rx="2" fill="#59ff96" opacity=".3"/>
  <rect x="140" y="186" width="180" height="4" rx="2" fill="#59ff96" opacity=".35"/>
  <rect x="140" y="200" width="140" height="4" rx="2" fill="#59ff96" opacity=".25"/>
  <rect x="140" y="222" width="100" height="4" rx="2" fill="#59ff96" opacity=".4"/>
  <rect x="250" y="222" width="60" height="4" rx="2" fill="#0e7c66" opacity=".6"/>
  <!-- Stand neck -->
  <rect x="230" y="304" width="52" height="40" rx="4" fill="#1a1a1a" stroke="#fff" stroke-width="4" stroke-opacity=".08"/>
  <!-- Stand base -->
  <ellipse cx="256" cy="360" rx="80" ry="16" fill="#1a1a1a" stroke="#fff" stroke-width="4" stroke-opacity=".08"/>
  <!-- Status dot -->
  <circle cx="256" cy="86" r="0" fill="none"/>
  <circle cx="380" cy="116" r="8" fill="#59ff96"/>
  <circle cx="380" cy="116" r="8" fill="#59ff96" opacity=".4">
    <animate attributeName="r" values="8;14;8" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".4;0;.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- "N" letter on stand -->
  <text x="256" y="334" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="24" fill="#59ff96" opacity=".6">N</text>
</svg>
